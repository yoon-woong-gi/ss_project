<title>DRAM · READ / WRITE / REFRESH</title>
<link rel="stylesheet" href="dram-dashboard.css" />

<div class="app" data-scn="read" data-lang="en">
  <header class="hdr">
    <div class="brand">
      <span class="brand-mark">◐</span>
      <span class="brand-name">DRAM.OP</span>
      <span class="brand-sub" id="brand-sub">1T1C · DDR4 command model</span>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-scenario="read" role="tab" id="tab-read">
        READ
      </button>
      <button class="tab" data-scenario="write" role="tab" id="tab-write">
        WRITE
      </button>
      <button class="tab" data-scenario="refresh" role="tab" id="tab-refresh">
        REFRESH
      </button>
    </nav>
    <div class="hdr-right">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="ko" type="button">KO</button>
      </div>
      <div class="hdr-meta">
        <div>
          <span id="meta-array-label">ARRAY</span
          ><strong>8 ROW × 16 COL</strong>
        </div>
        <div>
          <span id="meta-profile-label">PROFILE</span
          ><strong>DDR4-3200 · CL22</strong>
        </div>
      </div>
    </div>
  </header>

  <section class="stage">
    <div class="stage-head">
      <span class="stage-label" id="stage-label">CELL ARRAY / BANK 0</span>
      <div class="stage-status">
        <span class="status-dot"></span>
        <span id="current-op">IDLE</span>
      </div>
    </div>
    <div class="svg-wrap">
      <svg
        class="grid-svg"
        id="svg"
        viewBox="0 0 900 520"
        preserveAspectRatio="xMidYMid meet"
      ></svg>
    </div>
    <div class="stage-legend">
      <span
        ><i class="lg-dot lg-idle"></i
        ><span id="legend-idle">Idle cell</span></span
      >
      <span
        ><i class="lg-dot lg-wl"></i
        ><span id="legend-wl">Word line asserted</span></span
      >
      <span
        ><i class="lg-dot lg-sa"></i
        ><span id="legend-sa">Sense amp latched</span></span
      >
      <span
        ><i class="lg-dot lg-dq"></i
        ><span id="legend-dq">DQ / bit-line active</span></span
      >
    </div>
  </section>

  <aside class="side">
    <div class="panel step-panel">
      <div class="panel-eyebrow">
        <span id="panel-step">STEP</span>
        <span
          ><span class="num" id="step-num">01</span> /
          <span id="step-total">07</span></span
        >
      </div>
      <span class="step-op" id="step-op">IDLE</span>
      <h2 id="step-title">Precharged / Idle</h2>
      <p id="step-desc"></p>
    </div>

    <div class="panel">
      <div class="panel-title" id="panel-command">COMMAND BUS</div>
      <div class="command-list" id="command-list"></div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span id="panel-timing">TIMING</span> ·
        <span id="timing-profile">DDR4-3200</span>
      </div>
      <dl class="timing-list" id="timing-list"></dl>
    </div>
  </aside>

  <footer class="transport">
    <button class="ctrl" id="btn-reset">↺ RESET</button>
    <button class="ctrl" id="btn-prev">◀ PREV</button>
    <button class="ctrl primary" id="btn-play">▶ PLAY</button>
    <button class="ctrl" id="btn-next">NEXT ▶</button>
    <div class="progress">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="step-count">
      <strong id="sc-cur">01</strong> / <span id="sc-tot">07</span>
    </div>
  </footer>
</div>

<div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

<script src="dram-dashboard.js"></script>
