<title>DRAM · READ / WRITE / REFRESH</title>
<style>
  :root {
    --void: #04060d;
    --panel-0: #080c17;
    --panel-1: #0d1223;
    --panel-2: #141b34;
    --panel-3: #1c2547;
    --rule: rgba(140, 158, 210, 0.10);
    --rule-2: rgba(140, 158, 210, 0.24);
    --ink-1: #e8ecf5;
    --ink-2: #a4adc6;
    --ink-3: #6b7594;
    --ink-4: #414968;
    --ink-5: #2a3050;
    --read: #22d3ee;
    --write: #fbbf24;
    --refresh: #4ade80;
    --hot: #f0faff;
    --danger: #f87171;

    --scn: var(--read);
    --scn-rgb: 34, 211, 238;

    --font-sans: -apple-system, "SF Pro Text", "Segoe UI", "Inter", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
  }

  [data-scn="write"] {
    --scn: var(--write);
    --scn-rgb: 251, 191, 36;
  }
  [data-scn="refresh"] {
    --scn: var(--refresh);
    --scn-rgb: 74, 222, 128;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--void);
    color: var(--ink-1);
    font-family: var(--font-sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 600px at 15% 0%, rgba(var(--scn-rgb), 0.09), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 100%, rgba(var(--scn-rgb), 0.06), transparent 60%);
    pointer-events: none;
    transition: background 0.7s ease;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(140, 158, 210, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140, 158, 210, 0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%);
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template:
      "header header" auto
      "stage side" 1fr
      "footer footer" auto
      / 1fr 400px;
    gap: 14px;
    padding: 18px;
    max-width: 1520px;
    margin: 0 auto;
  }

  /* HEADER */
  .hdr {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    padding: 18px 24px;
    border: 1px solid var(--rule);
    background: linear-gradient(180deg, var(--panel-1), var(--panel-0));
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .hdr::before {
    content: "";
    position: absolute;
    left: 0; top: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 5%, var(--scn) 50%, transparent 95%);
    opacity: 0.7;
    transition: background 0.7s;
  }

  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand-mark {
    font-family: var(--font-mono);
    font-size: 24px;
    color: var(--scn);
    transition: color 0.6s;
    text-shadow: 0 0 24px currentColor;
  }
  .brand-name {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.08em;
  }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.24em;
    margin-left: 8px;
  }

  .tabs { display: flex; gap: 0; }
  .tab {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.28em;
    padding: 12px 26px;
    background: transparent;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    border-right-width: 0;
    cursor: pointer;
    transition: color 0.3s, background 0.3s;
    position: relative;
  }
  .tab:last-child { border-right-width: 1px; }
  .tab:hover { color: var(--ink-1); background: rgba(255, 255, 255, 0.02); }
  .tab.active {
    color: var(--scn);
    background: rgba(var(--scn-rgb), 0.08);
    box-shadow: inset 0 0 24px rgba(var(--scn-rgb), 0.06);
    border-color: var(--scn);
    z-index: 1;
  }
  .tab.active + .tab { border-left-color: var(--scn); }
  .tab.active::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 2px;
    background: var(--scn);
    box-shadow: 0 0 12px var(--scn);
  }

  .hdr-meta {
    display: flex;
    gap: 22px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.22em;
  }
  .hdr-meta > div {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }
  .hdr-meta strong {
    color: var(--ink-1);
    font-weight: 500;
    font-family: var(--font-mono);
    letter-spacing: 0.12em;
    font-size: 12px;
  }

  /* STAGE */
  .stage {
    grid-area: stage;
    background: linear-gradient(180deg, var(--panel-1), var(--panel-0));
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 560px;
    position: relative;
    overflow: hidden;
  }

  .stage-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .stage-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.28em;
  }
  .stage-status { display: flex; align-items: center; gap: 10px; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--scn);
    box-shadow: 0 0 14px currentColor;
    color: var(--scn);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  #current-op {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--scn);
    letter-spacing: 0.16em;
    transition: color 0.5s;
  }

  .svg-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .grid-svg {
    width: 100%;
    height: 100%;
    max-height: 520px;
  }

  .stage-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .stage-legend span { display: flex; align-items: center; gap: 8px; }
  .lg-dot { display: inline-block; width: 10px; height: 10px; }
  .lg-idle { background: var(--ink-5); border: 1px solid var(--ink-4); }
  .lg-wl { background: var(--scn); box-shadow: 0 0 8px currentColor; color: var(--scn); border-radius: 2px; }
  .lg-sa {
    width: 0; height: 0; background: transparent;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 8px solid var(--hot);
    filter: drop-shadow(0 0 3px var(--hot));
  }
  .lg-dq { background: var(--scn); border-radius: 50%; box-shadow: 0 0 6px var(--scn); color: var(--scn); }

  /* SIDE */
  .side {
    grid-area: side;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .panel {
    background: linear-gradient(180deg, var(--panel-1), var(--panel-0));
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 18px 20px;
    position: relative;
  }
  .panel-eyebrow, .panel-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.28em;
    margin: 0 0 14px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-eyebrow .num {
    color: var(--scn);
    transition: color 0.5s;
  }

  .step-panel {
    flex: 1;
    min-height: 240px;
    display: flex;
    flex-direction: column;
  }
  .step-op {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--scn);
    letter-spacing: 0.18em;
    margin-bottom: 8px;
    padding: 4px 10px;
    display: inline-block;
    align-self: flex-start;
    border: 1px solid var(--scn);
    background: rgba(var(--scn-rgb), 0.08);
    border-radius: 2px;
    transition: all 0.4s;
  }
  .step-panel h2 {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.005em;
    margin: 4px 0 14px 0;
    line-height: 1.15;
    color: var(--ink-1);
    text-wrap: balance;
  }
  .step-panel p {
    font-family: var(--font-sans);
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--ink-2);
    margin: 0;
    max-width: 44ch;
  }
  .step-panel p code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--ink-1);
    background: rgba(255, 255, 255, 0.04);
    padding: 1px 5px;
    border-radius: 2px;
  }

  .command-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 30px;
    align-items: center;
  }
  .command-list:empty::before {
    content: "—";
    color: var(--ink-4);
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .cmd-chip {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 11px;
    border: 1px solid var(--rule-2);
    border-radius: 2px;
    color: var(--ink-2);
    letter-spacing: 0.14em;
    background: rgba(255, 255, 255, 0.02);
    transition: all 0.3s;
  }
  .cmd-chip.current {
    color: var(--scn);
    border-color: var(--scn);
    background: rgba(var(--scn-rgb), 0.12);
    box-shadow: 0 0 14px rgba(var(--scn-rgb), 0.3);
  }

  .timing-list {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px 14px;
    margin: 0;
    font-family: var(--font-mono);
    font-size: 12px;
    align-items: baseline;
  }
  .timing-list dt {
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }
  .timing-list .desc {
    color: var(--ink-4);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: left;
  }
  .timing-list dd {
    margin: 0;
    color: var(--ink-1);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .timing-list .hi dt,
  .timing-list .hi .desc {
    color: var(--scn);
  }
  .timing-list .hi dd {
    color: var(--scn);
    text-shadow: 0 0 8px currentColor;
  }
  .timing-list-row {
    display: contents;
    transition: color 0.4s;
  }

  /* FOOTER TRANSPORT */
  .transport {
    grid-area: footer;
    display: grid;
    grid-template-columns: auto auto auto auto 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 14px 20px;
    border: 1px solid var(--rule);
    background: linear-gradient(180deg, var(--panel-0), var(--panel-1));
    border-radius: 3px;
  }
  .ctrl {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 11px 18px;
    background: transparent;
    color: var(--ink-2);
    border: 1px solid var(--rule-2);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    min-width: 92px;
  }
  .ctrl:hover:not(:disabled) {
    color: var(--ink-1);
    border-color: var(--ink-3);
    background: rgba(255, 255, 255, 0.03);
  }
  .ctrl:disabled { opacity: 0.35; cursor: not-allowed; }
  .ctrl.primary {
    color: var(--scn);
    border-color: var(--scn);
    background: rgba(var(--scn-rgb), 0.1);
    box-shadow: 0 0 18px rgba(var(--scn-rgb), 0.22);
    min-width: 110px;
  }
  .ctrl.primary:hover:not(:disabled) {
    background: rgba(var(--scn-rgb), 0.18);
  }

  .progress {
    height: 2px;
    background: var(--ink-5);
    position: relative;
    overflow: hidden;
    margin: 0 12px;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(var(--scn-rgb), 0.2), var(--scn));
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s;
    box-shadow: 0 0 8px var(--scn);
  }
  .step-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: 0.22em;
    font-variant-numeric: tabular-nums;
  }
  .step-count strong {
    color: var(--scn);
    font-weight: 500;
    transition: color 0.5s;
  }

  /* SVG cell styles */
  .cell-rect {
    fill: var(--panel-2);
    stroke: var(--ink-5);
    stroke-width: 1;
    transition: fill 0.35s, stroke 0.35s, filter 0.35s;
  }
  .cell-cap {
    fill: var(--ink-4);
    opacity: 0.6;
    transition: fill 0.35s, opacity 0.35s;
  }
  .cell.wl .cell-rect { stroke: var(--scn); stroke-width: 1.25; fill: rgba(var(--scn-rgb), 0.06); }
  .cell.wl .cell-cap { fill: var(--scn); opacity: 1; }

  .cell.sharing .cell-rect {
    stroke: var(--scn);
    animation: cell-share 1.4s ease-in-out infinite;
  }
  .cell.sharing .cell-cap {
    fill: var(--scn);
    opacity: 1;
    animation: cap-pulse 1.4s ease-in-out infinite;
  }
  @keyframes cell-share {
    0%, 100% { fill: rgba(var(--scn-rgb), 0.08); }
    50% { fill: rgba(var(--scn-rgb), 0.22); }
  }
  @keyframes cap-pulse {
    0%, 100% { r: 3; }
    50% { r: 5; }
  }

  .cell.sensed .cell-rect { stroke: var(--scn); fill: rgba(var(--scn-rgb), 0.18); }
  .cell.sensed .cell-cap { fill: var(--hot); opacity: 1; }

  .cell.hit .cell-rect {
    stroke: var(--hot);
    fill: rgba(var(--scn-rgb), 0.35);
    filter: drop-shadow(0 0 6px var(--scn));
  }
  .cell.hit .cell-cap { fill: var(--hot); r: 4.5; }

  .cell.writing .cell-rect {
    animation: cell-write 0.9s ease-in-out infinite;
    stroke: var(--write);
  }
  .cell.writing .cell-cap { fill: var(--write); animation: cap-pulse 0.9s ease-in-out infinite; }
  @keyframes cell-write {
    0%, 100% { fill: rgba(251, 191, 36, 0.15); }
    50% { fill: rgba(251, 191, 36, 0.5); filter: drop-shadow(0 0 8px var(--write)); }
  }

  .cell.refresh .cell-rect { stroke: var(--refresh); fill: rgba(74, 222, 128, 0.14); }
  .cell.refresh .cell-cap { fill: var(--refresh); opacity: 1; animation: cap-pulse 1.2s ease-in-out infinite; }

  /* Word lines / bit lines */
  .wordline {
    stroke: var(--ink-5);
    stroke-width: 1;
    transition: stroke 0.4s, stroke-width 0.4s, filter 0.4s;
  }
  .wordline.on {
    stroke: var(--scn);
    stroke-width: 1.75;
    filter: drop-shadow(0 0 4px var(--scn));
  }

  .bitline {
    stroke: var(--ink-5);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    transition: stroke 0.4s, filter 0.4s;
  }
  .bitline.on {
    stroke: var(--hot);
    stroke-dasharray: none;
    filter: drop-shadow(0 0 3px var(--hot));
  }
  .bitline.hit {
    stroke: var(--scn);
    stroke-dasharray: none;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 5px var(--scn));
  }

  /* Sense amps */
  .sa {
    fill: var(--panel-3);
    stroke: var(--ink-4);
    stroke-width: 1;
    transition: fill 0.35s, stroke 0.35s, filter 0.35s;
  }
  .sa.latched {
    fill: var(--hot);
    stroke: var(--hot);
    filter: drop-shadow(0 0 5px var(--hot));
  }
  .sa.hit {
    fill: var(--scn);
    stroke: var(--scn);
    filter: drop-shadow(0 0 8px var(--scn));
  }
  .sa.writing {
    fill: var(--write);
    stroke: var(--write);
    filter: drop-shadow(0 0 8px var(--write));
  }

  /* DQ */
  .dq-bus {
    stroke: var(--ink-4);
    stroke-width: 2;
    transition: stroke 0.35s, filter 0.35s;
  }
  .dq-bus.on {
    stroke: var(--scn);
    filter: drop-shadow(0 0 6px var(--scn));
  }
  .dq-label {
    font-family: var(--font-mono);
    font-size: 11px;
    fill: var(--ink-3);
    letter-spacing: 0.2em;
    transition: fill 0.35s;
  }
  .dq-label.on { fill: var(--scn); }

  .dq-particle {
    fill: var(--scn);
    opacity: 0;
    filter: drop-shadow(0 0 4px var(--scn));
  }
  .dq-particle.flowing {
    animation: dq-flow 1.5s linear infinite;
  }
  .dq-particle.flowing.write { animation-direction: reverse; fill: var(--write); filter: drop-shadow(0 0 4px var(--write)); }
  @keyframes dq-flow {
    0%   { transform: translateX(0); opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateX(560px); opacity: 0; }
  }

  /* Decoder boxes */
  .dec-box {
    fill: var(--panel-2);
    stroke: var(--rule-2);
    stroke-width: 1;
    transition: stroke 0.35s;
  }
  .dec-box.on {
    stroke: var(--scn);
    filter: drop-shadow(0 0 4px var(--scn));
  }
  .dec-label {
    font-family: var(--font-mono);
    font-size: 9px;
    fill: var(--ink-3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .dec-value {
    font-family: var(--font-mono);
    font-size: 12px;
    fill: var(--ink-2);
    letter-spacing: 0.05em;
    transition: fill 0.35s;
  }
  .dec-value.on { fill: var(--scn); }

  .axis-tick {
    font-family: var(--font-mono);
    font-size: 8.5px;
    fill: var(--ink-4);
    letter-spacing: 0.05em;
  }
  .axis-tick.hi { fill: var(--scn); }

  .frame {
    fill: none;
    stroke: var(--rule-2);
    stroke-width: 1;
  }
  .frame-label {
    font-family: var(--font-mono);
    font-size: 9px;
    fill: var(--ink-3);
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  /* Ambient scan sweep on stage */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(var(--scn-rgb), 0.03) 50%, transparent 100%);
    height: 24px;
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 3;
    opacity: 0.7;
    transition: background 0.5s;
  }
  @keyframes scan {
    0%   { transform: translateY(-40px); }
    100% { transform: translateY(600px); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    .stage::after, body::before { display: none; }
  }

  /* Header right cluster (language + meta) */
  .hdr-right {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  /* Language toggle */
  .lang-toggle {
    display: inline-flex;
    border: 1px solid var(--rule-2);
    border-radius: 2px;
    overflow: hidden;
  }
  .lang-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    padding: 8px 12px;
    background: transparent;
    color: var(--ink-3);
    border: none;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .lang-btn + .lang-btn { border-left: 1px solid var(--rule-2); }
  .lang-btn:hover { color: var(--ink-1); background: rgba(255, 255, 255, 0.03); }
  .lang-btn.active {
    color: var(--scn);
    background: rgba(var(--scn-rgb), 0.12);
    box-shadow: inset 0 0 12px rgba(var(--scn-rgb), 0.08);
  }

  /* Technical term tooltip trigger */
  .term {
    border-bottom: 1px dotted rgba(var(--scn-rgb), 0.55);
    cursor: help;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
    padding-bottom: 1px;
  }
  .term:hover, .term:focus {
    color: var(--scn);
    background: rgba(var(--scn-rgb), 0.08);
    border-bottom-color: var(--scn);
    outline: none;
  }
  .timing-list dt.term {
    display: inline-block;
    letter-spacing: 0.04em;
  }

  /* Floating tooltip */
  .tooltip {

    z-index: 200;
    max-width: 320px;
    padding: 12px 14px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel-1));

    color: var(--ink-1);
    font-family: var(--font-sans);
    font-size: 12.5px;
    line-height: 1.55;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6), 0 0 16px rgba(var(--scn-rgb), 0.25);
  }
  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .tooltip .tt-name {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;

  @media (max-width: 1120px) {

    .hdr-right { flex-wrap: wrap; gap: 12px; }
    .hdr-meta { display: none; }
  }
</style>

<script>
(() => {
  'use strict';

  // ---------- Grid geometry ----------
  const NUM_ROWS = 8;
  const NUM_COLS = 16;
  const GRID_X = 132;
  const GRID_Y = 62;
  const CELL_W = 34;
  const CELL_H = 28;
  const STRIDE_X = 42;
  const STRIDE_Y = 34;
  const GRID_W = STRIDE_X * NUM_COLS - (STRIDE_X - CELL_W); // = 42*16-8 = 664
  const GRID_H = STRIDE_Y * NUM_ROWS - (STRIDE_Y - CELL_H); // = 34*8-6  = 266
  const SA_Y = GRID_Y + GRID_H + 42;   // sense amp row Y
  const DQ_Y = SA_Y + 62;              // DQ bus Y

  const cellX = c => GRID_X + c * STRIDE_X;
  const cellY = r => GRID_Y + r * STRIDE_Y;
  const cellCX = c => cellX(c) + CELL_W / 2;
  const cellCY = r => cellY(r) + CELL_H / 2;

  // ---------- Scenarios ----------
  // Correctness notes:
  //  - ACT drives one word line; sense amps then latch entire row (row buffer). tRCD covers ACT→col-cmd.
  //  - Because word line is still on during sense/restore, cells are automatically restored.
  //    Precharge just closes the row and equalises bit lines to Vdd/2.
  //  - WRITE requires row to be open; write drivers overpower sense amps, cell is updated
  //    while word line is still asserted. tWR is needed before PRE.
  //  - REF uses internal counter (no row address on bus), refreshes 1..N rows per command,
  //    all banks must be precharged. tREFI 7.8us, tREFW 64ms, tRFC ~350ns typical.
  const TARGET_ROW = 3;
  const TARGET_COL = 6;

  const IDLE_STATE = {
    wordlines: [], bitlines: [], hitCol: null,
    cellPhase: 'idle', senseAmpPhase: 'idle', dqPhase: 'idle',
    rowAddr: '—', colAddr: '—',
    bus: [], highlightTiming: null
  };

  const scenarios = {
    read: {
      label: { en: 'READ', ko: '읽기' },
      color: 'read',
      profile: { en: 'DDR4-3200 · CL16', ko: 'DDR4-3200 · CL16' },
      timings: [
        { name: 'tRCD', value: { en: '13.75 ns', ko: '13.75 ns' }, desc: { en: 'ACT → column cmd', ko: 'ACT → 컬럼 명령' }, key: 'tRCD' },
        { name: 'CL',   value: { en: '16 cyc',   ko: '16 사이클' }, desc: { en: 'RD → first DQ',    ko: 'RD → 첫 DQ 출력' }, key: 'CL' },
        { name: 'BL',   value: { en: '8 beats',  ko: '8 비트' },   desc: { en: 'burst length',     ko: '버스트 길이' },     key: null },
        { name: 'tRAS', value: { en: '32 ns',    ko: '32 ns' },    desc: { en: 'ACT → PRE min',    ko: 'ACT → PRE 최소' },  key: 'tRAS' },
        { name: 'tRP',  value: { en: '13.75 ns', ko: '13.75 ns' }, desc: { en: 'PRE → next ACT',   ko: 'PRE → 다음 ACT' },  key: 'tRP' },
      ],
      steps: [
        {
          op: { en: 'IDLE', ko: '유휴' },
          title: { en: 'Precharged / Idle', ko: '프리차지 상태 / 유휴' },
          desc: {
            en: 'Bank is in the precharged state — every bit line is held at <code>Vdd/2</code> by the precharge equalisers, and no word line is asserted. The row buffer is empty; no column can be accessed until a row is opened.',
            ko: '뱅크가 프리차지 상태입니다 — 모든 비트라인이 프리차지 이퀄라이저에 의해 <code>Vdd/2</code>로 유지되며, 어떤 워드라인도 활성화되어 있지 않습니다. 행 버퍼는 비어 있고, 로우가 열리기 전까지는 어떤 컬럼도 접근할 수 없습니다.'
          },
          state: { ...IDLE_STATE }
        },
        {
          op: { en: 'ACT · row 0x3', ko: 'ACT · 로우 0x3' },
          title: { en: 'ACT — Row Activate', ko: 'ACT — 로우 활성화' },
          desc: {
            en: 'Controller drives <code>ACTIVATE</code> on the command bus with a bank + row address. Word line <code>0x3</code> rises to the boosted voltage <code>Vpp</code>; every access transistor in row 3 turns on.',
            ko: '컨트롤러가 명령 버스에 뱅크 + 로우 주소와 함께 <code>ACTIVATE</code>를 인가합니다. 워드라인 <code>0x3</code>이 부스트 전압 <code>Vpp</code>까지 올라가며, 로우 3의 모든 액세스 트랜지스터가 켜집니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], cellPhase: 'wl', rowAddr: '0x3', bus: ['ACT'] }
        },
        {
          op: { en: 'ACT · charge sharing', ko: 'ACT · 전하 공유' },
          title: { en: 'Charge Sharing', ko: '전하 공유' },
          desc: {
            en: 'Each cell capacitor (~25 fF) shares its charge with the much larger bit-line capacitance. Every bit line drifts a few tens of millivolts above or below <code>Vdd/2</code> — the direction encodes the stored bit for that column.',
            ko: '각 셀 커패시터(~25 fF)가 훨씬 큰 비트라인 커패시턴스와 전하를 공유합니다. 모든 비트라인이 <code>Vdd/2</code> 위 또는 아래로 수십 밀리볼트 정도 움직이며 — 그 방향이 해당 컬럼에 저장된 비트를 나타냅니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', cellPhase: 'sharing', rowAddr: '0x3', bus: ['ACT'] }
        },
        {
          op: { en: 'SENSE / RESTORE', ko: '센싱 / 복원' },
          title: { en: 'Sense & Restore', ko: '센싱 및 복원' },
          desc: {
            en: 'Sense amplifiers detect the differential, latch it, and drive each bit line to full rail (<code>0</code> or <code>Vdd</code>). Because word line 3 is still asserted, the same drive restores full charge into every cell of the row — the row buffer is now valid. Interval from ACT to this point is <code>tRCD</code>.',
            ko: '센스 앰프가 차동 신호를 감지하고 래치한 뒤, 각 비트라인을 완전한 레벨(<code>0</code> 또는 <code>Vdd</code>)로 구동합니다. 워드라인 3이 여전히 활성 상태이므로 동일한 구동이 로우의 모든 셀에 전하를 복원합니다 — 이제 행 버퍼가 유효합니다. ACT부터 이 지점까지의 간격이 <code>tRCD</code>입니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', cellPhase: 'sensed', senseAmpPhase: 'latched', rowAddr: '0x3', bus: ['ACT'], highlightTiming: 'tRCD' }
        },
        {
          op: { en: 'RD · col 0x6', ko: 'RD · 컬럼 0x6' },
          title: { en: 'RD — Column Select', ko: 'RD — 컬럼 선택' },
          desc: {
            en: 'Controller issues <code>READ</code> with column address <code>0x6</code>. The column decoder selects column 6 from the row buffer; that value is routed to the internal read data path.',
            ko: '컨트롤러가 컬럼 주소 <code>0x6</code>과 함께 <code>READ</code>를 발행합니다. 컬럼 디코더가 행 버퍼에서 컬럼 6을 선택하고, 그 값이 내부 리드 데이터 경로로 전달됩니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', hitCol: TARGET_COL, cellPhase: 'sensed', senseAmpPhase: 'reading', dqPhase: 'route', rowAddr: '0x3', colAddr: '0x6', bus: ['ACT', 'RD'] }
        },
        {
          op: { en: 'CL · DQ burst', ko: 'CL · DQ 버스트' },
          title: { en: 'CAS Latency → DQ Burst', ko: 'CAS 지연 → DQ 버스트' },
          desc: {
            en: 'After CAS latency (<code>CL</code> clock cycles from the RD command), data appears on the DQ pins. DDR4 bursts <code>BL8</code> — eight beats over four clock cycles, captured on both edges.',
            ko: 'CAS 지연(RD 명령부터 <code>CL</code> 클록 사이클) 후에 데이터가 DQ 핀에 나타납니다. DDR4는 <code>BL8</code>로 버스트합니다 — 4 클록 사이클 동안 8 비트, 두 에지 모두에서 캡처됩니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', hitCol: TARGET_COL, cellPhase: 'sensed', senseAmpPhase: 'reading', dqPhase: 'burst', rowAddr: '0x3', colAddr: '0x6', bus: ['ACT', 'RD'], highlightTiming: 'CL' }
        },
        {
          op: { en: 'PRE', ko: 'PRE' },
          title: { en: 'PRE — Precharge', ko: 'PRE — 프리차지' },
          desc: {
            en: '<code>PRECHARGE</code> closes the row. Word line 3 drops, then the equalisers pull bit lines back to <code>Vdd/2</code>. After <code>tRP</code> the bank is ready for another ACT — to the same or a different row.',
            ko: '<code>PRECHARGE</code>가 로우를 닫습니다. 워드라인 3이 떨어진 뒤, 이퀄라이저가 비트라인을 다시 <code>Vdd/2</code>로 되돌립니다. <code>tRP</code>가 지나면 뱅크는 동일한 또는 다른 로우에 대한 새 ACT를 받을 준비가 됩니다.'
          },
          state: { ...IDLE_STATE, bus: ['ACT', 'RD', 'PRE'], highlightTiming: 'tRP' }
        }
      ]
    },

    write: {
      label: { en: 'WRITE', ko: '쓰기' },
      color: 'write',
      profile: { en: 'DDR4-3200 · CWL14', ko: 'DDR4-3200 · CWL14' },
      timings: [
        { name: 'tRCD', value: { en: '13.75 ns', ko: '13.75 ns' }, desc: { en: 'ACT → column cmd',  ko: 'ACT → 컬럼 명령' }, key: 'tRCD' },
        { name: 'CWL',  value: { en: '14 cyc',   ko: '14 사이클' }, desc: { en: 'WR → first data',   ko: 'WR → 첫 데이터' },  key: 'CWL' },
        { name: 'BL',   value: { en: '8 beats',  ko: '8 비트' },   desc: { en: 'burst length',      ko: '버스트 길이' },     key: null },
        { name: 'tWR',  value: { en: '15 ns',    ko: '15 ns' },    desc: { en: 'last data → PRE',   ko: '마지막 데이터 → PRE' }, key: 'tWR' },
        { name: 'tRP',  value: { en: '13.75 ns', ko: '13.75 ns' }, desc: { en: 'PRE → next ACT',    ko: 'PRE → 다음 ACT' },  key: 'tRP' },
      ],
      steps: [
        {
          op: { en: 'IDLE', ko: '유휴' },
          title: { en: 'Precharged / Idle', ko: '프리차지 상태 / 유휴' },
          desc: {
            en: 'Bank precharged. Bit lines at <code>Vdd/2</code>, no word line asserted. Any write must first open the target row — DRAM has no per-cell write path independent of the row buffer.',
            ko: '뱅크가 프리차지된 상태입니다. 비트라인은 <code>Vdd/2</code>에 있고, 활성화된 워드라인은 없습니다. 쓰기를 위해서는 먼저 대상 로우를 열어야 합니다 — DRAM은 행 버퍼와 독립적인 셀 단위 쓰기 경로가 없습니다.'
          },
          state: { ...IDLE_STATE }
        },
        {
          op: { en: 'ACT · row 0x3', ko: 'ACT · 로우 0x3' },
          title: { en: 'ACT — Row Activate', ko: 'ACT — 로우 활성화' },
          desc: {
            en: 'Controller issues <code>ACTIVATE</code> with row <code>0x3</code>. Word line 3 rises; every access transistor in the row turns on. Identical to the read path — DRAM does not distinguish read vs. write during activation.',
            ko: '컨트롤러가 로우 <code>0x3</code>과 함께 <code>ACTIVATE</code>를 발행합니다. 워드라인 3이 올라가고, 해당 로우의 모든 액세스 트랜지스터가 켜집니다. 읽기 경로와 동일합니다 — DRAM은 활성화 단계에서 읽기와 쓰기를 구분하지 않습니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], cellPhase: 'wl', rowAddr: '0x3', bus: ['ACT'] }
        },
        {
          op: { en: 'ACT · sense / restore', ko: 'ACT · 센싱 / 복원' },
          title: { en: 'Row Buffer Populated', ko: '행 버퍼 로드 완료' },
          desc: {
            en: 'Charge sharing followed by sense amplification — same physics as a read. The entire row is now latched in the sense amps. Only after this can a column be modified.',
            ko: '전하 공유 후 센스 증폭 — 읽기와 동일한 물리 과정입니다. 이제 전체 로우가 센스 앰프에 래치되어 있습니다. 이 단계 이후에만 컬럼을 수정할 수 있습니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', cellPhase: 'sensed', senseAmpPhase: 'latched', rowAddr: '0x3', bus: ['ACT'], highlightTiming: 'tRCD' }
        },
        {
          op: { en: 'WR · col 0x6', ko: 'WR · 컬럼 0x6' },
          title: { en: 'WR — Write Command', ko: 'WR — 쓰기 명령' },
          desc: {
            en: 'Controller issues <code>WRITE</code> with column <code>0x6</code> and drives new data onto DQ. After Write Latency (<code>CWL</code>) the write drivers overpower sense-amp column 6, forcing the new bit into the row buffer.',
            ko: '컨트롤러가 컬럼 <code>0x6</code>과 함께 <code>WRITE</code>를 발행하고 새 데이터를 DQ에 실어 보냅니다. 쓰기 지연(<code>CWL</code>) 후에 쓰기 드라이버가 컬럼 6의 센스 앰프를 압도하며 새 비트를 행 버퍼에 강제로 씁니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', hitCol: TARGET_COL, cellPhase: 'sensed', senseAmpPhase: 'writing', dqPhase: 'incoming', rowAddr: '0x3', colAddr: '0x6', bus: ['ACT', 'WR'], highlightTiming: 'CWL' }
        },
        {
          op: { en: 'CELL WRITE-BACK', ko: '셀 라이트백' },
          title: { en: 'Cell Update', ko: '셀 업데이트' },
          desc: {
            en: 'Because word line 3 is still asserted, the overwritten sense-amp value flows back through the still-open access transistor and charges (or discharges) the target cell capacitor to its new value.',
            ko: '워드라인 3이 여전히 활성 상태이기 때문에, 덮어쓴 센스 앰프 값이 여전히 열린 액세스 트랜지스터를 통해 다시 흘러 대상 셀 커패시터를 새 값으로 충전(또는 방전)합니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', hitCol: TARGET_COL, cellPhase: 'writing', senseAmpPhase: 'writing', dqPhase: 'incoming', rowAddr: '0x3', colAddr: '0x6', bus: ['ACT', 'WR'] }
        },
        {
          op: { en: 'tWR · recovery', ko: 'tWR · 복구' },
          title: { en: 'Write Recovery', ko: '쓰기 복구' },
          desc: {
            en: 'After the last write beat, the DRAM needs <code>tWR</code> (≈15 ns typical) to fully charge the cell before the row can be closed. Issuing PRE too early risks an incomplete write and lost data.',
            ko: '마지막 쓰기 비트 이후, DRAM은 로우를 닫기 전에 셀을 완전히 충전하기 위해 <code>tWR</code>(일반적으로 ≈15 ns)이 필요합니다. PRE를 너무 일찍 발행하면 불완전한 쓰기와 데이터 손실 위험이 있습니다.'
          },
          state: { ...IDLE_STATE, wordlines: [TARGET_ROW], bitlines: 'all', hitCol: TARGET_COL, cellPhase: 'sensed', senseAmpPhase: 'latched', rowAddr: '0x3', colAddr: '0x6', bus: ['ACT', 'WR'], highlightTiming: 'tWR' }
        },
        {
          op: { en: 'PRE', ko: 'PRE' },
          title: { en: 'PRE — Precharge', ko: 'PRE — 프리차지' },
          desc: {
            en: '<code>PRECHARGE</code> closes the row. Word line 3 drops, then bit lines are equalised back to <code>Vdd/2</code>. After <code>tRP</code> the bank is available for another ACT.',

    for (let c = 0; c < NUM_COLS; c++) {

          x: cellCX(c), y: GRID_Y - 8,
          class: 'axis-tick',
          'text-anchor': 'middle',
          id: `col-tick-${c}`

        t.textContent = c.toString(16).toUpperCase();
        svg.appendChild(t);
      }
    }
    // Row axis ticks
    for (let r = 0; r < NUM_ROWS; r++) {
      const t = el('text', {
        x: GRID_X - 12, y: cellCY(r) + 3,
        class: 'axis-tick',
        'text-anchor': 'end',
        id: `row-tick-${r}`
      });
      t.textContent = r.toString(16).toUpperCase();
      svg.appendChild(t);
    }

    // Word lines (behind cells)
    for (let r = 0; r < NUM_ROWS; r++) {
      const line = el('line', {
        x1: GRID_X - 8, y1: cellCY(r),

        class: 'wordline'
      });
      wlEls.push(line);
      svg.appendChild(line);
    }

    for (let c = 0; c < NUM_COLS; c++) {

    saLabel.textContent = 'SENSE AMPS';
    svg.appendChild(saLabel);

    // Sense amp triangles
    for (let c = 0; c < NUM_COLS; c++) {
      const cx = cellCX(c);
      const y0 = saBoxY + 6;
      const y1 = saBoxY + 22;
      const tri = el('polygon', {
        class: 'sa',
        points: `${cx - 7},${y0} ${cx + 7},${y0} ${cx},${y1}`
      });
      saEls.push(tri);
      svg.appendChild(tri);
      // Small stem down to DQ area
      svg.appendChild(el('line', {
        x1: cx, y1: y1 + 1, x2: cx, y2: DQ_Y - 6,
        class: 'bitline'
      }));
    }

    // DQ bus (horizontal aggregator)
    dqBusEl = el('line', {
      x1: GRID_X - 8, y1: DQ_Y, x2: GRID_X + GRID_W + 8, y2: DQ_Y,
      class: 'dq-bus'
    });
    svg.appendChild(dqBusEl);
    // DQ arrow to right
    svg.appendChild(el('line', {
      x1: GRID_X + GRID_W + 8, y1: DQ_Y, x2: GRID_X + GRID_W + 60, y2: DQ_Y,
      class: 'dq-bus', id: 'dq-out'
    }));
    dqLabelEl = el('text', {
      x: GRID_X + GRID_W + 68, y: DQ_Y + 4, class: 'dq-label', id: 'svg-dq-out-label'
    });
    dqLabelEl.textContent = 'DQ →';
    svg.appendChild(dqLabelEl);

    // DQ label on left
    const dqLeft = el('text', {
      x: GRID_X - 18, y: DQ_Y + 4, class: 'frame-label', 'text-anchor': 'end', id: 'svg-dq-bus-label'
    });
    dqLeft.textContent = 'DQ BUS';
    svg.appendChild(dqLeft);

    // DQ flowing particle (three dots to simulate a burst)
    for (let i = 0; i < 3; i++) {
      const p = el('circle', {
        class: 'dq-particle',
        cx: GRID_X - 4 + i * 18,
        cy: DQ_Y, r: 3
      });
      p.style.animationDelay = `${i * 0.15}s`;
      svg.appendChild(p);
      if (i === 0) dqParticleEl = [];
      dqParticleEl.push(p);
    }

    // Row decoder box (left side)
    const decW = 76, decH = 34;
    rowDecEl = el('rect', {
      x: 20, y: GRID_Y + GRID_H / 2 - decH / 2, width: decW, height: decH,
      class: 'dec-box', rx: 2
    });
    svg.appendChild(rowDecEl);
    const rowDecLabel = el('text', {
      x: 20 + decW / 2, y: GRID_Y + GRID_H / 2 - 4, class: 'dec-label', 'text-anchor': 'middle', id: 'svg-row-dec-label'
    });
    rowDecLabel.textContent = 'ROW DEC';
    svg.appendChild(rowDecLabel);
    rowDecValue = el('text', {
      x: 20 + decW / 2, y: GRID_Y + GRID_H / 2 + 12, class: 'dec-value', 'text-anchor': 'middle'
    });
    rowDecValue.textContent = '—';
    svg.appendChild(rowDecValue);
    // Connector line to grid
    svg.appendChild(el('line', {
      x1: 20 + decW, y1: GRID_Y + GRID_H / 2,
      x2: GRID_X - 8, y2: GRID_Y + GRID_H / 2,
      class: 'wordline', style: 'opacity:0.35'
    }));

    // Column decoder box (top)
    colDecEl = el('rect', {
      x: GRID_X + GRID_W / 2 - 60, y: 10, width: 120, height: 32,
      class: 'dec-box', rx: 2
    });
    svg.appendChild(colDecEl);
    const colDecLabel = el('text', {
      x: GRID_X + GRID_W / 2, y: 25, class: 'dec-label', 'text-anchor': 'middle', id: 'svg-col-dec-label'
    });
    colDecLabel.textContent = 'COL DEC';
    svg.appendChild(colDecLabel);
    colDecValue = el('text', {
      x: GRID_X + GRID_W / 2 + 40, y: 25, class: 'dec-value', 'text-anchor': 'start'
    });
    colDecValue.textContent = '—';
    svg.appendChild(colDecValue);
    // Move col label to fit
    colDecLabel.setAttribute('x', GRID_X + GRID_W / 2 - 30);
    colDecLabel.setAttribute('text-anchor', 'start');
  }

  // ---------- Rendering ----------
  function classSet(el, cls, on) {
    if (on) el.classList.add(cls); else el.classList.remove(cls);
  }

  // Wrap known technical terms inside a DOM subtree with hoverable spans.
  const TERM_KEYS = Object.keys(TERM_DEFS).sort((a, b) => b.length - a.length);
  const TERM_REGEX = new RegExp(
    '(?:^|[\\s(\\[/,.;:])((?:' +
    TERM_KEYS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') +
    '))(?=$|[\\s)\\],.;:/])',
    'g'
  );
  function wrapTermsInNode(root) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(n) {
        // Skip nodes already inside a .term span
        let p = n.parentNode;
        while (p && p !== root) {
          if (p.classList && p.classList.contains('term')) return NodeFilter.FILTER_REJECT;
          p = p.parentNode;
        }
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node => {
      const text = node.nodeValue;
      TERM_REGEX.lastIndex = 0;
      if (!TERM_REGEX.test(text)) return;
      TERM_REGEX.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0;
      let m;
      while ((m = TERM_REGEX.exec(text)) !== null) {
        const term = m[1];
        const start = m.index + (m[0].length - term.length);
        if (start > last) frag.appendChild(document.createTextNode(text.slice(last, start)));
        const span = document.createElement('span');
        span.className = 'term';
        span.tabIndex = 0;
        span.dataset.term = term;
        span.textContent = term;
        frag.appendChild(span);
        last = start + term.length;
        // Ensure regex advances past the term
        TERM_REGEX.lastIndex = last;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });
  }

  function render() {
    const scn = scenarios[S.scenario];
    const step = scn.steps[S.step];
    const st = step.state;

    // Root scenario + language for CSS accent variable
    const app = document.querySelector('.app');
    app.setAttribute('data-scn', S.scenario);
    app.setAttribute('data-lang', S.lang);
    document.documentElement.lang = S.lang;

    // Language toggle button state
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === S.lang);
    });

    // Static UI strings
    document.getElementById('brand-sub').textContent = t(UI.brandSub);
    document.getElementById('meta-array-label').textContent = t(UI.metaArray);
    document.getElementById('meta-profile-label').textContent = t(UI.metaProfile);
    document.getElementById('stage-label').textContent = t(UI.stageLabel);
    document.getElementById('legend-idle').textContent = t(UI.legendIdle);
    document.getElementById('legend-wl').textContent = t(UI.legendWl);
    document.getElementById('legend-sa').textContent = t(UI.legendSa);
    document.getElementById('legend-dq').textContent = t(UI.legendDq);
    document.getElementById('panel-step').textContent = t(UI.panelStep);
    document.getElementById('panel-command').textContent = t(UI.panelCommand);
    document.getElementById('panel-timing').textContent = t(UI.panelTiming);
    document.getElementById('btn-reset').textContent = t(UI.btnReset);
    document.getElementById('btn-prev').textContent = t(UI.btnPrev);
    document.getElementById('btn-next').textContent = t(UI.btnNext);

    // SVG labels
    const setSvg = (id, val) => {
      const e = document.getElementById(id);
      if (e) e.textContent = val;
    };
    setSvg('svg-cell-array-label', t(UI.svgCellArray));
    setSvg('svg-sense-amps-label', t(UI.svgSenseAmps));
    setSvg('svg-dq-bus-label',     t(UI.svgDqBus));
    setSvg('svg-dq-out-label',     t(UI.svgDqOut));
    setSvg('svg-row-dec-label',    t(UI.svgRowDec));
    setSvg('svg-col-dec-label',    t(UI.svgColDec));

    // Tab labels
    document.getElementById('tab-read').textContent = t(scenarios.read.label);
    document.getElementById('tab-write').textContent = t(scenarios.write.label);
    document.getElementById('tab-refresh').textContent = t(scenarios.refresh.label);

    // Tabs active
    document.querySelectorAll('.tab').forEach(tabEl => {
      tabEl.classList.toggle('active', tabEl.dataset.scenario === S.scenario);
    });

    // Header op
    document.getElementById('current-op').textContent = t(step.op);

    // Step panel
    document.getElementById('step-num').textContent = String(S.step + 1).padStart(2, '0');
    document.getElementById('step-total').textContent = String(scn.steps.length).padStart(2, '0');
    document.getElementById('step-op').textContent = t(step.op);
    document.getElementById('step-title').textContent = t(step.title);
    const descEl = document.getElementById('step-desc');
    descEl.innerHTML = t(step.desc);
    wrapTermsInNode(descEl);

    // Command bus — wrap chips as hoverable terms too
    const cbEl = document.getElementById('command-list');
    cbEl.innerHTML = '';
    st.bus.forEach((cmd, i) => {
      const chip = document.createElement('span');
      chip.className = 'cmd-chip' + (i === st.bus.length - 1 ? ' current' : '');
      chip.textContent = cmd;
      if (TERM_DEFS[cmd]) {
        chip.classList.add('term');
        chip.dataset.term = cmd;
        chip.tabIndex = 0;
      }
      cbEl.appendChild(chip);
    });

    // Timing panel
    const tp = document.getElementById('timing-list');
    tp.innerHTML = '';
    document.getElementById('timing-profile').textContent = t(scn.profile);
    scn.timings.forEach(row => {
      const isHi = st.highlightTiming === row.key;
      const dt = document.createElement('dt');
      dt.textContent = row.name;
      if (TERM_DEFS[row.name]) {
        dt.classList.add('term');
        dt.dataset.term = row.name;
        dt.tabIndex = 0;
      }
      const dd = document.createElement('dd');
      dd.textContent = t(row.value);
      const d = document.createElement('span');
      d.className = 'desc';
      d.textContent = t(row.desc);
      if (isHi) { dt.classList.add('hi'); dd.classList.add('hi'); d.classList.add('hi'); }
      tp.appendChild(dt);
      tp.appendChild(d);
      tp.appendChild(dd);
    });

    // Footer counters
    document.getElementById('sc-cur').textContent = String(S.step + 1).padStart(2, '0');
    document.getElementById('sc-tot').textContent = String(scn.steps.length).padStart(2, '0');
    document.getElementById('progress-fill').style.width =
      `${((S.step + 1) / scn.steps.length) * 100}%`;

    // Buttons
    document.getElementById('btn-prev').disabled = S.step === 0;
    document.getElementById('btn-next').disabled = S.step === scn.steps.length - 1;
    document.getElementById('btn-play').textContent = S.playing ? t(UI.btnPause) : t(UI.btnPlay);

    // Decoder values
    rowDecValue.textContent = st.rowAddr || '—';
    colDecValue.textContent = st.colAddr || '—';
    classSet(rowDecEl, 'on', st.rowAddr && st.rowAddr !== '—');
    classSet(rowDecValue, 'on', st.rowAddr && st.rowAddr !== '—');
    classSet(colDecEl, 'on', st.colAddr && st.colAddr !== '—');
    classSet(colDecValue, 'on', st.colAddr && st.colAddr !== '—');

    // Word lines
    const wlSet = new Set(st.wordlines);
    for (let r = 0; r < NUM_ROWS; r++) {
      classSet(wlEls[r], 'on', wlSet.has(r));
    }

    // Bit lines
    const blOn = st.bitlines === 'all';
    for (let c = 0; c < NUM_COLS; c++) {
      classSet(blEls[c], 'on', blOn);
      classSet(blEls[c], 'hit', st.hitCol === c);
    }

    // Cells
    for (let r = 0; r < NUM_ROWS; r++) {
      for (let c = 0; c < NUM_COLS; c++) {
        const g = cellEls[r][c];
        g.className.baseVal = 'cell';
        const rowActive = wlSet.has(r);
        const hit = st.hitCol === c && rowActive;
        if (hit && (st.cellPhase === 'writing')) {
          g.classList.add('writing');
        } else if (hit && (st.cellPhase === 'sensed' || st.cellPhase === 'sharing')) {
          g.classList.add('hit');
        } else if (rowActive) {
          if (st.cellPhase === 'sharing') g.classList.add('sharing');
          else if (st.cellPhase === 'sensed') g.classList.add('sensed');
          else if (st.cellPhase === 'writing') g.classList.add('writing');
          else if (st.cellPhase === 'refresh') g.classList.add('refresh');
          else g.classList.add('wl');
        }
      }
    }

    // Sense amps
    for (let c = 0; c < NUM_COLS; c++) {
      const sa = saEls[c];
      sa.className.baseVal = 'sa';
      if (st.senseAmpPhase === 'writing' && st.hitCol === c) sa.classList.add('writing');
      else if (st.senseAmpPhase === 'reading' && st.hitCol === c) sa.classList.add('hit');
      else if (st.senseAmpPhase === 'latched') sa.classList.add('latched');
      else if (st.senseAmpPhase === 'writing') sa.classList.add('latched');
      else if (st.senseAmpPhase === 'reading') sa.classList.add('latched');
    }

    // DQ
    const dqOn = st.dqPhase && st.dqPhase !== 'idle';
    classSet(dqBusEl, 'on', dqOn);
    classSet(document.getElementById('dq-out'), 'on', dqOn);
    classSet(dqLabelEl, 'on', dqOn);
    dqParticleEl.forEach(p => {
      p.classList.remove('flowing', 'write');
      if (st.dqPhase === 'burst') p.classList.add('flowing');
      else if (st.dqPhase === 'incoming') {
        p.classList.add('flowing', 'write');
        // reset origin for reversed flow (start from right)
        p.setAttribute('cx', GRID_X + GRID_W - 4 - dqParticleEl.indexOf(p) * 18);
      } else if (st.dqPhase === 'route') p.classList.add('flowing');
    });
    // Ensure normal-flow particles start from left
    if (st.dqPhase === 'burst' || st.dqPhase === 'route') {
      dqParticleEl.forEach((p, i) => p.setAttribute('cx', GRID_X - 4 + i * 18));
    }
  }

  // ---------- Controls ----------
  function goto(step) {
    const scn = scenarios[S.scenario];
    S.step = Math.max(0, Math.min(scn.steps.length - 1, step));
    if (S.step === scn.steps.length - 1) pause();
    render();
  }

  function next() { goto(S.step + 1); }
  function prev() { goto(S.step - 1); }
  function reset() { pause(); goto(0); }

  function play() {
    if (S.playing) return;
    const scn = scenarios[S.scenario];
    if (S.step >= scn.steps.length - 1) goto(0);
    S.playing = true;
    render();
    S.timer = setInterval(() => {
      const scn = scenarios[S.scenario];
      if (S.step >= scn.steps.length - 1) { pause(); return; }
      goto(S.step + 1);
    }, 2200);
  }
  function pause() {
    S.playing = false;
    if (S.timer) { clearInterval(S.timer); S.timer = null; }
    render();
  }
  function togglePlay() { S.playing ? pause() : play(); }

  function switchScenario(name) {
    if (!scenarios[name]) return;
    pause();
    S.scenario = name;
    S.step = 0;
    render();
  }

  function setLanguage(lang) {
    if (lang !== 'en' && lang !== 'ko') return;
    if (S.lang === lang) return;
    S.lang = lang;
    try { localStorage.setItem('dram-lang', lang); } catch (_) {}
    render();
  }

  // ---------- Tooltip for technical terms ----------
  function setupTooltip() {
    const tip = document.getElementById('tooltip');
    if (!tip) return;
    let hideTimer = null;

    function show(target) {
      const key = target.dataset.term;
      const def = TERM_DEFS[key];
      if (!def) return;
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      tip.innerHTML = '';
      const name = document.createElement('span');
      name.className = 'tt-name';
      name.textContent = def.name || key;
      const body = document.createElement('span');
      body.className = 'tt-body';
      body.textContent = def[S.lang] || def.en;
      tip.appendChild(name);
      tip.appendChild(body);
      // Position after content is set so we know its size
      tip.classList.add('visible');
      tip.setAttribute('aria-hidden', 'false');
      position(target);
    }

    function position(target) {
      const r = target.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const margin = 8;
      let left = r.left + r.width / 2 - tr.width / 2;
      let top = r.bottom + margin;
      // Flip above if overflowing viewport bottom
      if (top + tr.height > window.innerHeight - 8) {
        top = r.top - tr.height - margin;
      }
      // Clamp horizontally
      left = Math.max(8, Math.min(window.innerWidth - tr.width - 8, left));
      tip.style.left = `${left}px`;
      tip.style.top = `${top}px`;
    }

    function hide() {
      hideTimer = setTimeout(() => {
        tip.classList.remove('visible');
        tip.setAttribute('aria-hidden', 'true');
      }, 60);
    }

    // Event delegation — works for terms rendered later too
    document.addEventListener('mouseover', e => {
      const target = e.target.closest && e.target.closest('.term');
      if (target) show(target);
    });
    document.addEventListener('mouseout', e => {
      const target = e.target.closest && e.target.closest('.term');
      if (target) hide();
    });
    document.addEventListener('focusin', e => {
      const target = e.target.closest && e.target.closest('.term');
      if (target) show(target);
    });
    document.addEventListener('focusout', e => {
      const target = e.target.closest && e.target.closest('.term');
      if (target) hide();
    });
    // Dismiss on scroll
    window.addEventListener('scroll', () => {
      tip.classList.remove('visible');
    }, true);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') tip.classList.remove('visible');
    });
  }

  // ---------- Wire up ----------
  function init() {
    buildSVG();

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchScenario(tab.dataset.scenario));
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });
    document.getElementById('btn-reset').addEventListener('click', reset);
    document.getElementById('btn-prev').addEventListener('click', prev);
    document.getElementById('btn-next').addEventListener('click', next);
    document.getElementById('btn-play').addEventListener('click', togglePlay);

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowRight': case 'l': next(); break;
        case 'ArrowLeft':  case 'h': prev(); break;
        case ' ': e.preventDefault(); togglePlay(); break;
        case 'r': case 'R': reset(); break;
        case '1': switchScenario('read'); break;
        case '2': switchScenario('write'); break;
        case '3': switchScenario('refresh'); break;
        case 'k': case 'K': setLanguage(S.lang === 'en' ? 'ko' : 'en'); break;
      }
    });

    setupTooltip();
    render();
  }

  init();
})();
</script>
